<!doctype html>
<html lang="zh-CN">
<head>

    <main class="device-shell utility-shell">
        <header class="device-header">

            </a>

                        <small>开放世界 · 武侠</small>
                    </span>
                    <span class="game-arrow" aria-hidden="true">›</span>

                <a class="game-card game-link" href="games/赤壁之战之乱世枭雄/" data-game="cb1">
                    <span class="game-key" aria-hidden="true">03</span>
                    <span class="game-copy">
                        <strong>赤壁之战之乱世枭雄</strong>

                    <span class="game-copy">
                        <strong>侠客行</strong>
                        <small>武侠 · 奇遇冒险</small>
                    </span>
                    <span class="game-arrow" aria-hidden="true">›</span>

        <nav class="dialog-actions" aria-label="RPG 存档辅助功能">
            <a class="device-button" href="../backup.html?game=fmj">备份 / 还原</a>

        <footer class="device-footer utility-footer">
