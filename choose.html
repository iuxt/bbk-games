<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#dfe3d1">
    <meta name="description" content="选择三国霸业游戏版本">
    <title>选择版本 · 三国霸业</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="css/portal.css">

    <script src="js/jquery.min.js"></script>
    <script src="js/lcd.js?ver=11"></script>
    <script src="js/base64.js"></script>
    <script>
        $(function() {
            loadLibLists("#list");
            if (getLibPath()) {
                $("#current-version").text("当前版本：" + getLibName());
            }
        });
    </script>

    <script type="text/html" id="item_temp">
        <article class="game-card version-card">
            <button class="game-link version-main" type="button"
                    onclick="chooseLib('{title}', '{libpath}', this)">
                <span class="game-key version-key" aria-hidden="true">ROM</span>
                <span class="game-copy">
                    <strong>{title}</strong>
                    <small>选择此版本并进入游戏</small>
                </span>
                <span class="game-arrow" aria-hidden="true">›</span>
            </button>
            <button class="settings-key detail-key" type="button"
                    aria-expanded="false" aria-controls="desc{descid}"
                    onclick="loadDetail('#desc{descid}', '{descpath}'); this.setAttribute('aria-expanded', this.getAttribute('aria-expanded') !== 'true')">
                <span aria-hidden="true">i</span>
                <span class="sr-only">查看 {title} 详情</span>
            </button>
            <div id="desc{descid}" class="version-detail" style="display:none;"></div>
        </article>
    </script>
</head>
<body>
    <main class="device-shell utility-shell">
        <header class="device-header">
            <a class="brand" href="index.html" aria-label="返回 BBK 经典游戏首页">
                <span class="brand-mark">BBK</span>
                <span>经典游戏</span>
            </a>
            <span class="power-light" aria-hidden="true"></span>
        </header>

        <section class="lcd-panel" aria-labelledby="page-title">
            <p class="lcd-kicker">GAME 01 / VERSION SELECT</p>
            <h1 id="page-title">选择版本<span aria-hidden="true">_</span></h1>
            <p id="current-version" class="lcd-help">选择一个版本开始三国霸业</p>
        </section>

        <section class="game-section" aria-labelledby="version-list-title">
            <div class="section-heading">
                <h2 id="version-list-title">可用版本</h2>
                <span>3 ROMS</span>
            </div>
            <div id="list" class="action-list" aria-live="polite">
                <div class="loading-card">正在读取版本列表…</div>
            </div>
        </section>

        <footer class="device-footer utility-footer">
            <span>GAME 01</span>
            <a class="footer-link" href="index.html">‹ 返回游戏中心</a>
        </footer>
    </main>

    <noscript>
        <p class="noscript-note">版本列表需要 JavaScript 才能载入。<a href="index.html">返回游戏中心</a></p>
    </noscript>
</body>
</html>
