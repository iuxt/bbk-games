<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>载入存档 - 三国霸业</title>
    <link rel="stylesheet" type="text/css" href="css/baye.css" />
    <link rel="icon" href="favicon.png">
    <meta content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" id="viewport" name="viewport">
    <script src="js/jquery.min.js"></script>
    <script src="js/lzma_worker-min.js"></script>
    <script src="js/base64.js"></script>
    <style>
        .status { padding: 20px; font-size: 18px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="status" id="status">正在载入存档...</div>
    <script>
        function getQuery(name) {
            var match = window.location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }

        function safeSet(key, value) {
            try {
                localStorage[key] = value;
                return true;
            } catch (e) {
                $("#status").html("存档写入失败：浏览器存储不可用<br>(" + e + ")");
                return false;
            }
        }

        $(function () {
            var sav = getQuery("sav");
            var libName = getQuery("name");

            if (!sav) {
                $("#status").text("缺少存档数据");
                return;
            }

            var data;
            try {
                // 逆过程：Base64 解码 -> LZMA 解压，对应 get-sav.html 的 LZMA.compress + Base64.encode
                var bytes = Base64.decode(sav);
                data = LZMA.decompress(bytes);
            } catch (e) {
                $("#status").html("存档解压失败:<br>" + e);
                return;
            }

            if (!data || typeof data !== "string") {
                $("#status").text("存档格式无效");
                return;
            }

            // data 形如 "sango0内容.sango1内容"，与 get-sav.html 的 dump 对应
            var parts = data.split('.');
            if (parts.length < 2) {
                $("#status").text("存档格式错误");
                return;
            }

            if (!safeSet("baye//data//sango0.sav", parts[0])) return;
            if (!safeSet("baye//data//sango1.sav", parts[1])) return;
            if (libName) safeSet("baye/libname", libName);

            $("#status").html("存档载入成功，即将进入游戏。<br>请在游戏中载入<b>第四个存档</b>。");
            setTimeout(function () {
                window.location.href = "index.html";
            }, 2000);
        });
    </script>
</body>
</html>
