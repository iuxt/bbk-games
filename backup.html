<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#dfe3d1">
    <meta name="description" content="备份或还原游戏存档文件">
    <title>备份 / 还原 · BBK 经典游戏</title>
    <link rel="icon" href="favicon.png">
    <link rel="stylesheet" href="css/portal.css">

    <script src="js/jquery.min.js"></script>
    <script src="js/lcd.js?ver=11"></script>
    <script src="js/backup.js?ver=1"></script>
    <script>
        // 通用存档备份 / 还原：按 ?game= 选择 profile（baye / fmj），槽位与版本由 profile 驱动
        $(function () {
            var B = window.BBKBackup;
            var profile = B.getProfile(new URLSearchParams(location.search).get("game")) || B.SAVE_PROFILES.baye;

            // 门户编号（页眉 / 页脚显示用）
            var PORTAL_NO = { baye: "GAME 01", fmj: "GAME 04" };
            var portalNo = PORTAL_NO[profile.id] || "GAME";

            var storage = window.localStorage;
            function readKey(k) { return storage.getItem(k); }
            function safeSet(k, v) {
                try { storage.setItem(k, v); return true; }
                catch (e) { return false; }
            }

            function todayStamp() {
                var d = new Date();
                function pad(x) { return (x < 10 ? "0" : "") + x; }
                return d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate());
            }

            // baye 的版本显示名（fmj 无版本，返回 null）
            function versionLabel() {
                if (profile.versionKeys.indexOf("baye/libname") >= 0 && typeof getLibName === "function") {
                    return getLibName();
                }
                return null;
            }

            function showResult(title, help, kind) {
                $("#result-title").text(title);
                $("#result-help").text(help);
                $("#result").removeClass("is-warn").addClass(kind === "warn" ? "is-warn" : "");
            }

            // 导出存档槽 n 为 .sav 文件
            function exportSlot(slot) {
                var payload = B.buildExportPayload(profile, slot, readKey);
                if (!payload) {
                    showResult("存档 " + (slot + 1) + " 是空的",
                               "请先在游戏中存档，再回来备份。", "warn");
                    return;
                }

                var blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a");
                a.href = url;
                a.download = B.fileName(profile, slot, todayStamp());
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);

                showResult("已导出存档 " + (slot + 1),
                           "文件名 " + a.download + "。请妥善保存，可用于日后还原。", "ok");
            }

            // 还原：文件选择 → 解析
            var pendingRestore = null;
            var targetSlot = 0;

            function onFilePicked(input) {
                var file = input.files && input.files[0];
                if (!file) return;

                var reader = new FileReader();
                reader.onload = function () {
                    var data;
                    try {
                        data = JSON.parse(reader.result);
                    } catch (e) {
                        rejectFile(file.name, "文件格式无效", "无法解析存档文件，请确认是本站导出的 .sav 文件。");
                        return;
                    }

                    var parsed = B.parseBackup(data);
                    if (!parsed) {
                        rejectFile(file.name, "存档格式错误", "这不是有效的 " + profile.name + " 存档备份。");
                        return;
                    }
                    if (parsed.profileId !== profile.id) {
                        var src = B.getProfile(parsed.profileId);
                        rejectFile(file.name, "存档类型不匹配",
                                   "该备份属于「" + (src ? src.name : parsed.profileId) +
                                   "」，与当前「" + profile.name + "」不符。");
                        return;
                    }

                    pendingRestore = parsed;
                    $("#restore-file-name").text(file.name);

                    // 默认目标槽 = 文件来源槽
                    targetSlot = (typeof parsed.slot === "number") ? parsed.slot : 0;
                    if (targetSlot >= profile.slots) targetSlot = 0;
                    syncSlotPicker();
                    $("#restore-btn").prop("disabled", false);

                    var fromSlot = (typeof parsed.slot === "number") ? (parsed.slot + 1) : "?";
                    showResult("已读取存档文件",
                               "来源：存档 " + fromSlot + "。选择目标槽后点「还原存档」。", "info");
                };
                reader.readAsText(file);
            }

            function rejectFile(name, title, help) {
                pendingRestore = null;
                $("#restore-btn").prop("disabled", true);
                $("#restore-file-name").text(name);
                showResult(title, help, "warn");
            }

            function pickSlot(n) {
                targetSlot = n;
                syncSlotPicker();
            }

            function syncSlotPicker() {
                $(".slot-chip").each(function () {
                    var active = (Number($(this).data("slot")) === targetSlot);
                    $(this).attr("aria-checked", active ? "true" : "false");
                    $(this).toggleClass("is-active", active);
                });
            }

            function doRestore() {
                if (!pendingRestore) return;
                var parsed = pendingRestore;

                var ok = B.applyRestore(profile, targetSlot, parsed.files, parsed.version, safeSet);
                if (!ok) {
                    showResult("存档写入失败",
                               "浏览器存储不可用（可能配额已满）。还原中止。", "warn");
                    return;
                }

                var note = "已写入存档 " + (targetSlot + 1) + "。";
                if (parsed.version) {
                    var lib = parsed.version["baye/libname"];
                    note += lib ? ("版本已切换为「" + lib + "」；") : "版本信息已恢复；";
                } else if (profile.versionKeys.length) {
                    note += "备份未含版本信息，保持当前版本；";
                }
                note += "进入游戏后载入对应存档即可。";
                showResult("还原成功", note, "ok");
            }

            // 按 profile 动态渲染导出按钮
            function renderExport() {
                var $grid = $("#export-grid").empty();
                for (var n = 0; n < profile.slots; n++) {
                    (function (slot) {
                        var key = ("0" + (slot + 1)).slice(-2);
                        $("<button class=\"game-card game-link save-action\" type=\"button\"></button>")
                            .append('<span class="game-key" aria-hidden="true">' + key + "</span>")
                            .append('<span class="game-copy"><strong>导出存档 ' + (slot + 1) +
                                    '</strong><small>下载为 .sav 文件</small></span>')
                            .append('<span class="game-arrow" aria-hidden="true">›</span>')
                            .on("click", function () { exportSlot(slot); })
                            .appendTo($grid);
                    })(n);
                }
                $("#export-slot-count").text(profile.slots + " SLOTS");
            }

            // 按 profile 动态渲染目标槽选择器
            function renderSlotPicker() {
                var $picker = $("#slot-picker").empty();
                for (var n = 0; n < profile.slots; n++) {
                    (function (slot) {
                        $("<button type=\"button\" class=\"slot-chip\" data-slot=\"" + slot + "\">存档 " +
                          (slot + 1) + "</button>")
                            .attr("aria-checked", slot === targetSlot ? "true" : "false")
                            .toggleClass("is-active", slot === targetSlot)
                            .on("click", function () { pickSlot(slot); })
                            .appendTo($picker);
                    })(n);
                }
            }

            // 初始化页面文案
            document.title = "备份 / 还原 · " + profile.name;
            $(".lcd-kicker").text(portalNo + " / BACKUP & RESTORE");
            $("#page-game-name").text(profile.name);
            $("#portal-no-footer").text(portalNo);
            var label = versionLabel();
            if (label) {
                $("#lib-name").text("当前版本：" + label).show();
            } else {
                $("#lib-name").hide();
            }
            renderExport();
            renderSlotPicker();

            // 暴露给测试与内联事件
            window.exportSlot = exportSlot;
            window.onFilePicked = onFilePicked;
            window.pickSlot = pickSlot;
            window.doRestore = doRestore;
            window.__profile = profile;
        });
    </script>
</head>
<body>
    <main class="device-shell utility-shell">
        <header class="device-header">
            <a class="brand" href="index.html" aria-label="返回 BBK 经典游戏首页">
                <span class="brand-mark">BBK</span>
                <span>经典游戏</span>
            </a>
            <span class="power-light" aria-hidden="true"></span>
        </header>

        <section class="lcd-panel" aria-labelledby="page-title">
            <p class="lcd-kicker">BACKUP &amp; RESTORE</p>
            <h1 id="page-title">备份 / 还原<span aria-hidden="true">_</span></h1>
            <p class="lcd-help"><span id="page-game-name">游戏</span> · 导出存档槽为文件备份，或上传文件还原</p>
        </section>

        <section class="game-section" aria-labelledby="backup-title">
            <div class="section-heading">
                <h2 id="backup-title">备份存档</h2>
                <span id="export-slot-count">3 SLOTS</span>
            </div>
            <div class="save-grid" id="export-grid"></div>
        </section>

        <section class="game-section" aria-labelledby="restore-title">
            <div class="section-heading">
                <h2 id="restore-title">还原存档</h2>
                <span>UPLOAD</span>
            </div>

            <label class="game-card game-link save-action upload-card">
                <span class="game-key" aria-hidden="true">↑</span>
                <span class="game-copy">
                    <strong>选择存档文件</strong>
                    <small id="restore-file-name">点击选取 .sav 备份文件</small>
                </span>
                <span class="game-arrow" aria-hidden="true">›</span>
                <input type="file" accept=".sav,.json,application/json" id="restore-file" hidden
                       onclick="this.value=null" onchange="onFilePicked(this)">
            </label>

            <p class="slot-label">还原到目标槽</p>
            <div class="slot-picker" id="slot-picker" role="radiogroup" aria-label="目标存档槽"></div>

            <button type="button" class="restore-btn" id="restore-btn" disabled
                    onclick="doRestore()">还原存档</button>
        </section>

        <section id="result" class="transfer-panel" aria-live="polite" aria-atomic="true">
            <p class="transfer-version" id="lib-name">当前版本：—</p>
            <h2 id="result-title">等待操作</h2>
            <p class="transfer-help" id="result-help">先导出存档做备份，或选择备份文件还原到目标存档槽。</p>
        </section>

        <footer class="device-footer utility-footer">
            <span id="portal-no-footer">GAME</span>
            <a class="footer-link" href="index.html">‹ 返回游戏中心</a>
        </footer>
    </main>

    <noscript>
        <p class="noscript-note">备份/还原需要 JavaScript 才能读写存档文件。<a href="index.html">返回游戏中心</a></p>
    </noscript>
</body>
</html>
